<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="./manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Skoop Cricket 3D</title>
    <link rel="stylesheet" href="styles.css?v=i2n3t4">
    <!-- Load Three.js from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="app">
        <!-- 3D Canvas will be injected here -->

        <!-- UI Overlay -->
        <div id="ui-layer">
            <div class="scoreboard">
                <div class="team-info">
                    <span class="team-name">SKOOP STRIKERS</span>
                    <span class="score" id="score">142/3</span>
                </div>
                <div class="match-info">
                    <span id="overs">18.4 OVERS</span>
                    <span class="target">TARGET: 165</span>
                </div>
            </div>

            <div class="live-status">
                <div class="status-badge">INTERACTIVE PLAY</div>
                <div class="last-ball" id="last-ball">WAITING FOR BOWLER...</div>
            </div>

            <button class="interaction-hint" id="swing-btn">TAP TO SWING</button>

            <div class="ticker">
                <div class="ticker-content">
                    STRIKERS NEED 23 RUNS FROM 8 BALLS • MAXWELL ON 45(22) • KOHLI BOWLING HIS 4TH OVER • THE CROWD IS GOING WILD AT THE SKOOP ARENA! •
                </div>
            </div>
        </div>
    </div>

    <script src="script.js?v=i2n3t4"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function () {
                navigator.serviceWorker.register('./sw.js')
                    .then(function (reg) { console.log('[PWA] SW registered:', reg.scope); })
                    .catch(function (err) { console.warn('[PWA] SW registration failed:', err); });
            });
        }
    </script>
</body>
</html>
